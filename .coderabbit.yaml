# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: en-US
tone_instructions: >-
  Professional and direct. Focus on correctness, type safety, and adherence to
  project patterns. Flag deviations from conventions early. Be specific - cite
  the pattern being violated and what the fix should look like.

early_access: true
enable_free_tier: true

reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  high_level_summary_in_walkthrough: true
  review_status: true
  commit_status: true
  collapse_walkthrough: false
  changed_files_summary: true
  sequence_diagrams: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  poem: false
  enable_prompt_for_ai_agents: true
  in_progress_fortune: false
  abort_on_close: true
  disable_cache: false

  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
      - "wip"
    base_branches:
      - main
    ignore_usernames:
      - dependabot[bot]
      - release-please[bot]

  path_filters:
    - "!**/*.lock"
    - "!dist/**"
    - "!coverage.xml"
    - "!.coverage"
    - "!openapi-specs/**"
    - "!.mypy_cache/**"
    - "!.ruff_cache/**"
    - "!.pytest_cache/**"
    - "!assets/**"

  path_instructions:
    - path: "src/servicenow_mcp/tools/**/*.py"
      instructions: >-
        Tool module review checklist:

        1. Registration: Module must export register_tools(mcp, settings, auth_provider)
        that registers @mcp.tool() async functions decorated with @tool_handler.

        2. Error handling: Tool functions must be decorated with @tool_handler (from
        decorators.py) which provides automatic error handling via safe_tool_call().
        The decorator catches all exceptions and returns error envelopes - tool
        functions themselves should NOT contain try/except for error envelope generation.

        3. Response format: Tool functions return format_response() directly - it
        handles serialization internally. The standard envelope includes correlation_id,
        status, data, and optional error/pagination/warnings fields.

        4. Policy enforcement: Before accessing any table, call check_table_access(table).
        Before queries, call enforce_query_safety(). Before writes, call write_gate().
        After reads, apply mask_sensitive_fields() to returned records.

        5. Type hints: Every function must have full type annotations including
        return types. Use modern syntax - str | None (not Optional), dict[str, Any],
        list[str].

        6. Docstrings: Tool functions need docstrings with Args: sections - MCP
        uses these to generate tool schemas for LLM consumers.

        7. Functions should stay under 100 lines. Extract helpers if needed.

    - path: "src/servicenow_mcp/investigations/**/*.py"
      instructions: >-
        Investigation module review checklist:

        1. Each module must export async def run(client, params) -> dict and
        async def explain(client, element_id) -> dict.

        2. Modules are registered in INVESTIGATION_REGISTRY - verify the module
        name matches what is registered.

        3. Use the ServiceNowClient for all API calls - never construct raw
        httpx requests.

        4. Return structured dicts with clear keys - these get serialized to
        JSON for the MCP consumer.

    - path: "src/servicenow_mcp/client.py"
      instructions: >-
        HTTP client review checklist:

        1. ServiceNowClient must remain an async context manager (async with).

        2. All responses must go through _raise_for_status() which maps HTTP
        status codes to the custom exception hierarchy (AuthError 401,
        ForbiddenError 403, NotFoundError 404, ServerError 5xx).

        3. Guard uninitialized state with assert self._http_client is not None.

        4. No raw exception types - use the hierarchy from errors.py.

        5. Verify timeout and connection pooling settings are reasonable.

    - path: "src/servicenow_mcp/policy.py"
      instructions: >-
        SECURITY-CRITICAL CODE. Review with extra scrutiny:

        1. check_table_access() must deny access to DENIED_TABLES.

        2. enforce_query_safety() must prevent unbounded queries.

        3. mask_sensitive_fields() must apply MASK_VALUE to sensitive data.

        4. write_gate() must enforce write gating per environment config.

        5. No bypass paths - every code path must go through policy checks.

        6. Verify that new tables or fields added to allow/deny lists are
        intentional and documented.

    - path: "src/servicenow_mcp/*.py"
      instructions: >-
        Core module conventions:

        1. Module-level docstring required.

        2. Absolute imports only (from servicenow_mcp.xxx import yyy).

        3. Full type annotations on all functions including return types.
        Modern union syntax: str | None. Lowercase generics: dict[str, Any].

        4. snake_case for functions/variables, PascalCase for classes,
        UPPER_SNAKE_CASE for constants.

        5. Custom exceptions must inherit from ServiceNowMCPError.

        6. Composition over inheritance. Functions under 100 lines.

        7. Logger via logger = logging.getLogger(__name__).

    - path: "tests/**/*.py"
      instructions: >-
        Test review checklist:

        1. HTTP mocking: Use respx with @respx.mock decorator on async test
        methods. Never make real HTTP calls in unit tests.

        2. Tool tests: Use the helper pattern to register and extract tool
        callables via _register_and_get_tools(settings, auth_provider).

        3. Settings: Always construct Settings(_env_file=None) to avoid loading
        real env files in tests.

        4. Assertions: Parse tool output with toon_decode() or json.loads() and assert on the
        response envelope fields (status, data, error).

        5. Test classes: Group related tests in TestXxx classes. Methods start
        with test_ and have descriptive names.

        6. Fixtures: Shared fixtures belong in conftest.py. Integration tests
        use session-scoped fixtures from tests/integration/conftest.py.

        7. Mark integration tests with @pytest.mark.integration.

    - path: ".github/workflows/**"
      instructions: >-
        CI workflow review:

        1. Python version matrix must include 3.12, 3.13, and 3.14.

        2. Use uv for dependency management - not pip or poetry.

        3. Verify that lint (ruff check + ruff format --check), type check
        (mypy src/), and test (pytest) steps are all present.

        4. Check for pinned action versions (use SHA or major version tags).

        5. Ensure secrets are not exposed in logs.

  suggested_labels: true
  labeling_instructions:
    - label: "tools"
      instructions: "Apply when src/servicenow_mcp/tools/ files are modified"
    - label: "investigations"
      instructions: "Apply when src/servicenow_mcp/investigations/ files are modified"
    - label: "policy"
      instructions: "Apply when src/servicenow_mcp/policy.py is modified"
    - label: "tests"
      instructions: "Apply when tests/ files are modified"
    - label: "ci"
      instructions: "Apply when .github/ files are modified"
    - label: "docs"
      instructions: "Apply when README.md, CHANGELOG.md, or AGENTS.md are modified"
    - label: "dependencies"
      instructions: "Apply when pyproject.toml or uv.lock are modified"
    - label: "breaking-change"
      instructions: "Apply when public API signatures, tool names, or response envelope structure changes"
  auto_apply_labels: true

  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true
    custom:
      - enabled: true
        name: "Local CI verification"
        instructions: >-
          Remind the author to run the full local CI check before merging:
          uv run ruff check . && uv run ruff format --check . && uv run mypy src/ && uv run pytest

  pre_merge_checks:
    title:
      mode: error
      requirements: "Must follow conventional commit format: feat:, fix:, docs:, chore:, refactor:, test:, ci:, perf:, build:, style:"
    description:
      mode: warning
    custom_checks:
      - mode: error
        name: "Conventional commit PR title"
        instructions: >-
          Verify the PR title follows conventional commit format. It must start
          with one of: feat, fix, docs, chore, refactor, test, ci, perf, build,
          or style - followed by a colon and space, then a lowercase description.
          Scopes in parentheses are optional. Examples: "feat: add table export tool",
          "fix(policy): correct mask logic for password fields",
          "refactor(tools): extract common registration helper".

  tools:
    # Python tools - enabled
    ruff:
      enabled: true
    markdownlint:
      enabled: true
    yamllint:
      enabled: true
    actionlint:
      enabled: true
    shellcheck:
      enabled: true
    gitleaks:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 120000
    ast-grep:
      essential_rules: true

    # Disabled - not applicable to this Python project
    eslint:
      enabled: false
    biome:
      enabled: false
    hadolint:
      enabled: false
    checkov:
      enabled: false
    circleci:
      enabled: false
    phpstan:
      enabled: false
    golangci-lint:
      enabled: false
    cppcheck:
      enabled: false
    semgrep:
      enabled: false
    clippy:
      enabled: false
    rubocop:
      enabled: false
    buf:
      enabled: false
    swiftlint:
      enabled: false
    pmd:
      enabled: false
    detekt:
      enabled: false
    # Redundant Python linters - project uses ruff exclusively
    flake8:
      enabled: false
    pylint:
      enabled: false
    # Non-applicable language/framework tools
    oxc:
      enabled: false
    psscriptanalyzer:
      enabled: false
    blinter:
      enabled: false
    htmlhint:
      enabled: false
    stylelint:
      enabled: false
    tflint:
      enabled: false
    trivy:
      enabled: false
    trufflehog:
      enabled: false
    brakeman:
      enabled: false
    osvScanner:
      enabled: false
    regal:
      enabled: false
    fortitudeLint:
      enabled: false
    luacheck:
      enabled: false
    sqlfluff:
      enabled: false
    prismaLint:
      enabled: false
    dotenvLint:
      enabled: false
    phpmd:
      enabled: false
    phpcs:
      enabled: false
    clang:
      enabled: false
    opengrep:
      enabled: false
    checkmake:
      enabled: false
    shopifyThemeCheck:
      enabled: false
    smartyLint:
      enabled: false
    emberTemplateLint:
      enabled: false
    languagetool:
      enabled: false

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto

code_generation:
  docstrings:
    language: en-US
    path_instructions:
      - path: "src/servicenow_mcp/tools/**/*.py"
        instructions: >-
          Use Google-style docstrings. Tool functions must include an Args:
          section with indented parameter descriptions - MCP uses these for
          tool schema generation. Include a one-line summary, then a blank
          line, then Args: section.
      - path: "src/servicenow_mcp/**/*.py"
        instructions: >-
          Use Google-style docstrings. One-line summary for simple functions.
          Multi-line with Args:/Returns:/Raises: sections for complex ones.
          Every module needs a module-level docstring.
  unit_tests:
    path_instructions:
      - path: "tests/**/*.py"
        instructions: >-
          Use pytest with pytest-asyncio (auto mode). Mock HTTP calls with
          respx and @respx.mock decorator. Group tests in TestXxx classes.
          Use the _register_and_get_tools helper for tool tests. Always use
          Settings(_env_file=None) to avoid loading real env files. Parse
          tool output with toon_decode() or json.loads() and assert on envelope fields.

issue_enrichment:
  planning:
    enabled: true
    auto_planning:
      enabled: true
